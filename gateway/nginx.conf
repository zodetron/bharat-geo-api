server {
    listen 80;
    server_name _;

    # ── API proxy (Docker: http://api:3000 | set via API_UPSTREAM env var) ──
    # Used only when all services run in the same Docker network.
    # On Render/cloud, VITE_API_URL is baked into the JS at build time,
    # so browsers call the API directly and this proxy block is not used.
    location /api/ {
        proxy_pass         http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── Admin dashboard — served at /admin/ ──────────────────────
    location /admin/ {
        root       /usr/share/nginx/html;
        try_files  $uri $uri/ /admin/index.html;
    }

    # ── Client portal — served at /client/ ──────────────────────
    location /client/ {
        root       /usr/share/nginx/html;
        try_files  $uri $uri/ /client/index.html;
    }

    # ── Demo app — served at /demo/ ──────────────────────────────
    location /demo/ {
        root       /usr/share/nginx/html;
        try_files  $uri $uri/ /demo/index.html;
    }

    # ── Convenience redirects ────────────────────────────────────
    location = /        { return 301 /demo/; }
    location = /admin   { return 301 /admin/; }
    location = /client  { return 301 /client/; }
    location = /demo    { return 301 /demo/; }
}
